name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff

      - name: Compile Python sources
        run: python -m py_compile main.py agents/*.py graph/*.py tools/*.py evals/run_evals.py tests/*.py

      - name: Lint
        run: ruff check .

      - name: Run unit tests
        run: python -m unittest discover tests

      - name: Validate eval definitions
        run: python evals/run_evals.py

  sandbox-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build generated-code sandbox
        run: docker build -f docker/Dockerfile.sandbox -t the-pog-sandbox:ci .

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
